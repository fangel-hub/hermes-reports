<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>和仁科技 · 项目管理看板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;color:#fff}
.container{max-width:900px;margin:0 auto;padding:60px 20px}
.logo{text-align:center;margin-bottom:60px}
.logo h1{font-size:36px;font-weight:700;margin-bottom:8px}
.logo p{font-size:16px;opacity:.8}
.card-grid{display:grid;gap:24px}
.card{background:rgba(255,255,255,.15);backdrop-filter:blur(10px);border-radius:16px;padding:28px;cursor:pointer;transition:all .3s;border:1px solid rgba(255,255,255,.2);text-decoration:none;color:#fff;display:block}
.card:hover{background:rgba(255,255,255,.25);transform:translateY(-4px);box-shadow:0 8px 32px rgba(0,0,0,.2)}
.card .icon{font-size:40px;margin-bottom:12px}
.card .name{font-size:22px;font-weight:600;margin-bottom:6px}
.card .desc{font-size:14px;opacity:.75;line-height:1.5}
.card .tag{display:inline-block;margin-top:12px;padding:4px 12px;border-radius:20px;font-size:12px;background:rgba(255,255,255,.2)}
.footer{text-align:center;margin-top:60px;font-size:13px;opacity:.6}
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <h1>🏥 和仁科技</h1>
    <p>项目管理仪表盘 · 交付负责人</p>
  </div>
  <div class="card-grid">
    <a href="回款仪表盘.html" class="card">
      <div class="icon">📊</div>
      <div class="name">项目回款仪表盘</div>
      <div class="desc">56个项目回款追踪 · 高危预警 · 区域经营四部/绍兴/台州</div>
      <div class="tag">每周更新</div>
    </a>
    <a href="三方对接进度看板.html" class="card">
      <div class="icon">🔄</div>
      <div class="name">三方对接进度看板</div>
      <div class="desc">郑州市中心医院 · 国家创伤区域医疗中心 · 630上线倒计时</div>
      <div class="tag">每日更新</div>
    </a>
    <a href="日报汇总.html" class="card">
      <div class="icon">📋</div>
      <div class="name">项目日报汇总</div>
      <div class="desc">双湖A包信息化项目 · 每日进展 · 风险事项</div>
      <div class="tag">自动采集</div>
    </a>
  </div>
  <div class="footer">
    数据存储于个人知识库 · 每周自动更新 · Powered by Hermes Agent
  </div>
</div>
</body>
</html>
